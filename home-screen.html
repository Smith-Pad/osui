<div class='home-screen-top'>
    <div class='home-screen-top-content'>
        Smith-Pad
    </div>
</div>

<div class='home-screen-middle'>
    <div class='home-screen-middle-blur-color-2'></div>
    <div class='home-screen-middle-content'>
       <div class='home-screen-middle-clock'>

        <div id="senalClock"></div>
        
         
        <script type="text/javascript">
            function GetClock() {
                var d = new Date();
                var senalhour = d.getHours(),
                    senalmin = d.getMinutes();
                if (senalmin <= 9) senalmin = "0" + senalmin
    
                var senal_clock_text = "" + senalhour + ":" + senalmin + "";
                document.getElementById('senalClock').innerHTML = senal_clock_text;
            }
    
            GetClock();
            setInterval(GetClock, 1000);
        </script>    
        
        <div style='font-size: 40px;'>
        <script>
            var day = new Date();
            var hr = day.getHours();
            if (hr >= 0 && hr < 12) {
            document.write("Good Morning!");
            } else if (hr == 12) {
            document.write("Good Noon!");
            } else if (hr >= 12 && hr <= 17) {
            document.write("Good Afternoon!");
            } else {
            document.write("Good Evening!");
            }
            document.write("");
        </script>  

        </div> 
    
    </div>
    </div>
</div>
